---

- name: Prereq | install package needed to gather ip and hostname
  ansible.builtin.package:
    name: "{{ item }}"
  with_items:
    - iproute
    - hostname
    - NetworkManager
    - systemd-resolved
  become: True

- name: Prereq | Disables all ipv6
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.disable_ipv6
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  become: yes

- name: Prereq | Disables default ipv6
  ansible.posix.sysctl:
    name: net.ipv6.conf.default.disable_ipv6
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  become: yes

# NM will switch to Resolved as DNS resolver, thus we need to start it before NetworkManager
- name: Prereq | Start NetworkManager
  ansible.builtin.service:
    name: NetworkManager
    enabled: True
    state: started
  become: true

- name: Prereq | Start Systemd Resolved service
  ansible.builtin.service:
    name: systemd-resolved
    enabled: True
    state: started
  become: true

- name: Prereq | reload NetworkManager to have it rely on systemd-resolved
  ansible.builtin.command:
    cmd: "nmcli general reload"
  become: true
  changed_when: false

