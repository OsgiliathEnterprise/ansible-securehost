---
dependency:
  name: galaxy
  enabled: ${DEPENDENCY_ENABLED:-True}
  options:
    role-file: ${REQUIREMENTS_PATH:-requirements-standalone.yml}
    requirements-file: requirements-collections.yml
driver:
  name: vagrant
  provider:
    name: parallels
platforms:
  - name: idm.osgiliath.test
    box: ${TESTBOX:-bento/fedora-43}
    provider_options:
      cpus: 2
      memory: 3096
    interfaces:
      - type: dhcp
        # ip: "192.168.56.4"
        auto_config: true
        network_name: private_network
        # virtualbox__intnet: "internalnetwork"
    groups:
      - ipaservers
  - name: client.osgiliath.test
    box: ${TESTBOX:-bento/fedora-43}
    cpus: 2
    memory: 3096
    interfaces:
      - type: dhcp
        # ip: "192.168.56.5"
        auto_config: true
        network_name: private_network
        # virtualbox__intnet: "internalnetwork"
    groups:
      - ipaclients
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: "${MOLECULE_PROJECT_DIRECTORY}/../community-collections:${HOME}/.ansible/collections:/usr/share/ansible/collections"
  options:
    vvv: True
  config_options:
    defaults:
      forks: 20
    ssh_connection:
      pipelining: true
      ssh_args: -4 -o ControlMaster=auto -o ControlPersist=6000s
verifier:
  name: testinfra
  env:
    PYTHONWARNINGS: "ignore:.*U.*mode is deprecated:DeprecationWarning"
  options:
    v: 1
scenario:
  name: parallels
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
